<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            margin: 0 auto;
            width: 200px;
            height: 100px;
            list-style: none;
        }
        .item>ul{
            display: none;
            list-style: none;
            text-align: left;

        }
        .item:hover ul{
            display: block;
        }
    </style>
</head>
<body>
        <ul class="box1">
            <li class="item">
                视频教程
                <ul>
                    <li>1</li>
                    <li>2</li>
                    <li>3</li>
                </ul>
            </li>
        </ul>
</body>
</html>

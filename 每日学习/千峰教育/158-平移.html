<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平移</title>
    <style>
        /* 设置盒子的属性 */
        div{
            /* 设置宽高 */
            height: 100px;
            width: 100px;
            
            /*  设置背景颜色，边框*/
            background-color: red;
            border: 1px solid black;
            
            /*设置动画 */
            transition: all ease 2s 1s;

        }
        /* 盒子放置鼠标属性 */
        div:hover{
            transform: translate(100px,100px);
            background: yellow;
        }
    </style>
</head>
<body>
    <!--创建一个盒子-->
    <div></div>
    
</body>
</html>

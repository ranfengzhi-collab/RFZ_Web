<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付宝弹性盒案例</title>
    <link rel="stylesheet" href="../../image/font_5198471_ae1ts98mugv/iconfont.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        html,
        body {
            height: 100%;
        }

        .box {
            width: 955px;
            height: 1420px;
            margin: 0 auto;
            background: yellow;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 124px;
            background: rgba(14, 10, 124, 0.833);
            display: flex;
            color: white;
        }

        header i {
            width: 118px;
            height: 124px;
            line-height: 124px;
            text-align: center;


        }

        header span {

            height: 124px;
            line-height: 124px;
            font-size: 40px;
            flex: 1;
        }

        footer {
            height: 128px;
            background: rgba(250, 250, 249, 0.961);
            display: flex;
            flex-direction: row;


        }

        footer div {
            flex: 1;
            display: flex;
            flex-direction: column;
            text-align: center;

        }

        footer div p {
            height: 66px;
            line-height: 66px;
            color: rgb(165, 161, 161);

        }

        footer div:hover p {
            color: blue;
        }

        footer div p:nth-child(1) {
            font-size: 58px;
        }

        footer div p:nth-child(2) {
            font-size: 38px;
        }

        section {
            flex: 1;

        }

        .main {
            display: flex;
            height: 278px;
            background: rgba(14, 10, 124, 0.833);
            justify-content: space-around;
            align-items: center;
        }

        .main div {
            width: 120px;
            height: 168px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

        }

        .main div i {
            font-size: 100px;
        }

        .main div p {
            font-size: 20px;
            margin-top: 10px;
            font-family: "黑体";
            font-weight: bold;
        }

        .list {
            display: flex;
            flex-wrap: wrap;
            background: white;
        }

        .list div {
            width: 25%;
            height: 208px;
            border: 1px solid gray;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

        }

        .list div div {
            height: 77px;
            line-height: 77px;
            text-align: center;
            border: none;
            display: inline;

        }

        .list div div:nth-child(1) {
            font-size: 65px;
        }

        .list div p {
            font-size: 30px;
            text-align: center;
            cursor: default;
        }

        .icon-zhifubaozhifu {
            font-size: 48px;
        }
    </style>
</head>

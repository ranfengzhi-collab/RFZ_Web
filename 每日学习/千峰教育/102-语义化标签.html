<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语义化标签</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        header,
        footer {
            height: 50px;
            line-height: 50px;
            text-align: center;
            background: orange;
        }

        section {
            height: calc(100% - 100px);
        }

        nav,
        aside {
            width: 100px;
            height: 100%;
            background: #ccc;
            float: left;
        }

        main {
            width: calc(100% - 200px);
            height: 100%;
            background: white;
            float: left;
        }
        main .article1{
            height: 60%;
        }
        main .article2{
            height: 40%;
        }
    </style>
</head>

<body>
    <header>header</header>
    <section>
        <nav>
            <figure>导航栏</figure>
            <ul>
                <li>111</li>
                <li>222</li>
                <li>333</li>
            </ul>
        </nav>
        <main>
            <article class="article1">
                <header>article header</header>
                <p>article1中的内容</p>
                <footer>article footer</footer>
            </article>
            <article class="article2">
                <header>article header</header>
                <p>article2中的内容</p>
                <footer>article footer</footer>
            </article>
        </main>
        <aside>侧边栏</aside>
    </section>

    <footer>footer</footer>
</body>

</html>

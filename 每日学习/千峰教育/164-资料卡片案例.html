<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资料卡片案例</title>

    <style>
        /* 样式设置 */
        /* 通配符设置 */
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        /* 设置盒子的样式 */
        .box {
            width: 350px;
            border: 5px solid red;
            margin: 100px auto;
            position: relative;

        }

        /* 设置盒子中的图片样式 */
        .box img {
            width: 100%;
            transition: all 1s ;

        }

        /* 设置盒子中h2标签的样式 */
        .box h2 {
            position: absolute;
            left: 50px;
            top: 5px;
            color: rgb(43, 104, 19);
            font-size: 20px;
            transition: all 01s 0.5s;
        }

        /* 设置盒子中的p标签的样式 */
        .box p {
            position: absolute;
            left: 50px;
            width: 100px;
            

            color: aqua;
            background: blanchedalmond;
            font-size: 12px;
        }

        /* 分别设置各个p标签的位置 */

        .box .p1 {
            top: 40px;
            transform: translateX(-400px);
            transition: all ease 1s;
        }

        .box .p2 {
            top: 80px;
            transform: translateX(500px);
            transition: all ease 1s;
        }

        .box .p3 {
            top: 120px;
            transform: translateX(-400px);
            transition: all ease 1s;
        }

        /*  设置鼠标互动时各个部分的 动画，位移，样式  */
        .box h2:hover {
            transform: translateX(100px);
            transition: all ease 1s;

        }

        /* 三个各个的p标签的互动 */
        .box:hover .p1 {
            transform: translate(0px);
        }

        .box:hover .p2 {
            transform: translate(0px);
        }

        .box:hover .p3 {
            transform: translate(0px);
        }
        /* 设置图片的平移 */
        .box:hover img{
            transform: translateX(30px);
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <!-- 放置一个盒子 -->
    <div class="box">
        <!-- 盒子中放置图片，p标签.h2标题 -->
        <img src="/image/网页图片2.png" alt="">
        <h2>二级标题</h2>
        <p class="p1">内容1</p>
        <p class="p2">内容2</p>
        <p class="p3">内容3</p>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>增强表单</title>
</head>
<body>
    <form action="">
        颜色：<input type="color" name="color"><br>
       邮箱： <input type="email" name="email"><br>
       url地址：<input type="url" name="url"><br>
        号码：<input type="tel" name="tel"><br>
        滑块：<input type="range" name="range" min="10" max="80"><br>
        数字类型：<input type="number" name="number" min="0" max="100" value="0" step="10"><br>
        搜索：<input type="search" name="search"><br>
        日期：<input type="date" name="date"><br>
        精确到周：<input type="week" name="week"><br>
        精确到秒：<input type="datetime-local"><br>
        精确到月：<input type="month" name="month">
        <button >提交</button>
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三边栏</title>
    <style>
        *{
            margin: 0;
            padding: 0;

        }
        html,body{
            height: 100%;
        }
        .top,.bottom{
            width: 100%;
            height: 100px;
            background: #ccc;
        }
        .median{
            width: 100%;
            height: calc(100% - 200px);
            background:#aff;
        }
        .left,.right{
            width: 100px;
            height: 100%;
            background: red;
            float: left;
        }
        .center{
            width: calc(100% - 200px);
            height: 100%;
            background: green;
            float: left;
        }
    </style>
</head>
<body>
    <div class="top"></div>
    <div class="median">
        <div class="left"></div>
        <div class="center"></div>
        <div class="right"></div>
    </div>
    <div class="bottom"></div>
</body>
</html>

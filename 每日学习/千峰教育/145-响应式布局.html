<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>响应式布局-案例</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .top{
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .top>div{
            width: 48%;

        }
        .top img{
            width: 100%;
        }
        .right{
            display: flex;
            justify-content: space-between;
        }
        .right div{
            flex: 1;
        }
        .bottom{
            display: flex;
            justify-content: space-around;
            box-sizing: border-box;
            flex-wrap: wrap;
        }
        .bottom>div{
            width: 24%;
            padding: 5px;
            box-sizing: border-box;
            border: 1px solid black;
            margin-top: 10px;
            box-shadow: 0 0 5px black;
        }
        .bottom img{
            width: 100%;
        }
        

        @media screen and (max-width:768px){
            .top>div{
                width: 100%;
            }
        }

        @media screen and (max-width:1024px) and (min-width:768px){
            .bottom>div{
                width: 31%;
            }
            
        }
         @media screen and (max-width:768px) and (min-width:450px){
            .bottom>div{
                width: 48%;
            }
            
        }
         @media screen and (max-width:450px){
            .bottom>div{
                width: 90%;
            }
            
        }
    </style>
</head>
<body>
    <!--top临界点，768px 
    >768px 左48% 右48%
    <768px 上100% 下100%
    -->
    

    <!--bottom 临界点1024px
    >1024 23%*4
    >768 <1024 31%*3
    >450 <768 48%*2
    <450 90%*1
    -->

    <div class="top">
        <div class="left">
            <img src="/image/网页图片1.png" alt="">
        </div>
        <div class="right">
            <div>
                <img src="/image/网页图片2.png" alt="">
            </div>
            <div>
                <img src="/image/网页图片3.png" alt="">
            </div>
        </div>
    </div>

    <div class="bottom">
        <div>
            <img src="/image/网页图片5.png" alt="">
            <p>华北水利水电大学</p>
        </div>
        <div>
            <img src="/image/网页图片5.png" alt="">
            <p>华北水利水电大学</p>
        </div>
        <div>
            <img src="/image/网页图片5.png" alt="">
            <p>华北水利水电大学</p>
        </div>
        <div>
            <img src="/image/网页图片5.png" alt="">
            <p>华北水利水电大学</p>
        </div>
         <div>
            <img src="/image/网页图片5.png" alt="">
            <p>华北水利水电大学</p>
        </div>
        <div>
            <img src="/image/网页图片5.png" alt="">
            <p>华北水利水电大学</p>
        </div>
        <div>
            <img src="/image/网页图片5.png" alt="">
            <p>华北水利水电大学</p>
        </div>
        <div>
            <img src="/image/网页图片5.png" alt="">
            <p>华北水利水电大学</p>
        </div>
    </div>
</body>
</html>

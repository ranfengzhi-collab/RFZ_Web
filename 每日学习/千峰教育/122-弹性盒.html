<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹性盒</title>
    <style>
        .bigbox {
            width: 500px;
            height: 500px;
            border: 1px solid red;
            margin: 100px auto;
            display: flex;
            justify-content: space-between;
            /* flex-start:左对齐，flex-end:右对齐，center:居中，space-between:两端对齐，space-around:平均分布 */
        }

        .box {
            width: 100px;
            height: 100px;
            border: 1px dashed green;

        }

        .box5 {
            width: 300px;
            height: 120px;
            border: 1px solid red;
            margin: 100px auto;
            display: flex;
            flex-wrap: wrap;
            /* 换行 */

        }

        .box5 div {
            width: 60px;
            height: 60px;
            border: 1px dashed green;
            box-sizing: border-box;
        }

        .box6 {
            width: 300px;
            height: 300px;
            border: 1px solid black;
            flex-direction: row;
            /* row:主轴为水平方向，column:主轴为垂直方向，row-reverse:主轴为水平方向，反向排列，column-reverse:主轴为垂直方向，反向排列 */

            display:flex;
            margin:0 auto;

        }

        .box6 div{
            width:50px;
            height:50px;
            /* order:元素的排列顺序，默认为0，数值越小越靠前 */
            border:1px dashed red;

        }
        .box6 div:nth-child(2){
            order:-1;
            flex:1px;
            height:stretch;
        }
        .box6 div:nth-child(3){
            align-self:flex-end;
            /* align-self:单个元素的对齐方式，auto:继承父元素
            flex-start:与父元素的主轴起点对齐，flex-end:与父元素的主轴终点对齐，center:与父元素的主轴中心对齐，stretch:占满父元素的主轴 */
        }

        .box7{
            width:300px;
            height:300px;
            border:1px solid black;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:100px auto;
        }
        .box7 div{
            width:50px;
            height:50px;
            border:1px dashed red;

            
        }
    </style>
</head>

<body>
    <div class="bigbox">
        <div class="box1 box">11</div>
        <div class="box2 box">22</div>
        <div class="box3 box">33</div>
    </div>

    <div class="box5">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <div class="box6">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>

    <div class="box7">
        <div>111</div>
        <div>222</div>
        <div>333</div>
    </div>
</body>

</html>

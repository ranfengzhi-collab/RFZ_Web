<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>否定伪类选择器</title>
    <style>
        li:first-child{
            background-color: yellow;
        }
        li:not(:first-child){
            background-color: red;
        }
    </style>
</head>
<body>
    
    <ul>
        <li>111</li>
        <li>222</li>
        <li>333</li>
    </ul>
</body>
</html>

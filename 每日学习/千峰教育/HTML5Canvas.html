<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <canvas id="1" width="300px" height="300px"></canvas>
    <canvas id="2" width="300px" height="300px"></canvas>
    <canvas id="3" width="300px" height="300px"></canvas>
    <canvas id="4" width="300px" height="300px"></canvas>
    <canvas id="5" width="300px" height="300px"></canvas>
    <canvas id="5" width="300px" height="300px"></canvas>
    <script>
        var c1 = document.getElementById("1");
        var ctx = c1.getContext("2d");
        ctx.arc(150, 150, 50, 0, 2 * Math.PI);
        ctx.stroke();


        var c2 = document.getElementById("2");
        var ctx2 = c2.getContext("2d");
        ctx2.moveTo(0, 0);
        ctx2.lineTo(300, 300);
        ctx2.stroke();


        var c3 = document.getElementById("3");
        var ctx3 = c3.getContext("2d");
        ctx3.font = "30px Arial";
        ctx3.fillText("Hello World", 10, 50);

        var c4 = document.getElementById("4");
        var ctx4 = c4.getContext("2d");
        ctx4.font = "30px Arial";
        ctx4.strokeText("Hello World", 10, 50);

        var c5 = document.getElementById("5");
        var ctx5 = c5.getContext("2d");
        ctx5.drawImage();



    </script>
</body>

</html>

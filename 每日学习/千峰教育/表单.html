<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <form action="表格.html">
        <label for="First name">First name</label>
        <input type="text" name="First name" placeholder="请输入姓"><br>
        <label for="Last name">Last name</label>
        <input type="text" name="Last name" placeholder="请输入名"><br>
        <label for="user">用户名</label>
        <input type="text" name="user" placeholder="用户名"><br>
        <label for="password">密码</label>
        <input type="password" name="password" placeholder="密码"><br>
        <label for="sex">性别</label>
        <input type="radio" name="sex" id="nan" value="男">男 &emsp;
        <input type="radio" name="sex" id="nv" value="女">女<br>
        <p>你喜欢数学还是英语（可多选）</p>
        <input type="checkbox" name="subject" value="数学">数学 &emsp;
        <input type="checkbox" name="subject" value="英语">英语 <br>
        <label for="country" >国家：</label>
        <select name="country" id="country">
            <option value="CN">CN</option>
            <option value="UK">UK</option>
            <option value="USA">USA</option>
            <option value="JP">JP</option>
        </select><br>
        <input type="submit" value="注册">

        

    </form>
</body>
</html>
